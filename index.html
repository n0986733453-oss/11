<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jigsaw Quiz</title>

  <!-- =====================================================
       🎨  STYLES
  ===================================================== -->
  <style>
    /* ---------- Reset & Base ---------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f0ee;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    #app { width: 100%; max-width: 480px; }

    /* ---------- Header ---------- */
    h1 {
      font-size: 22px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 4px;
      color: #2a0a0a;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .subtitle {
      text-align: center;
      font-size: 11px;
      color: #c0392b;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      font-weight: 700;
    }

    /* ---------- Top Bar ---------- */
    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .round-info {
      font-size: 12px;
      color: #999;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #score-box {
      border: 1.5px solid #c0392b;
      border-radius: 4px;
      padding: 4px 14px;
      font-size: 14px;
      font-weight: 800;
      color: #c0392b;
      letter-spacing: 1px;
      background: #fff;
    }

    #hint-btn {
      font-size: 11px;
      padding: 5px 14px;
      border-radius: 4px;
      border: 1.5px solid #ccc;
      background: #fff;
      color: #888;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    #hint-btn:hover { border-color: #c0392b; color: #c0392b; }

    /* ---------- Progress Dots ---------- */
    #prog-dots {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 14px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #ddd;
      border: 1.5px solid #ccc;
    }
    .dot.done { background: #c0392b; border-color: #c0392b; }
    .dot.curr { background: #e74c3c; border-color: #e74c3c; }

    /* ---------- Puzzle Board ---------- */
    #puzzle-wrap {
      position: relative;
      width: 360px;
      height: 360px;
      margin: 0 auto 1.2rem;
      border-radius: 6px;
      overflow: hidden;
      border: 2.5px solid #c0392b;
      background: #ecddd9;
    }

    #bg-canvas {
      position: absolute;
      inset: 0;
      display: block;
    }

    #pieces-layer { position: absolute; inset: 0; }

    /* ---------- Jigsaw Piece ---------- */
    .piece {
      position: absolute;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 900;
      color: #7a1a0a;
      /* ✅ ทึบสนิท — ไม่มีความโปร่งแสง */
      background: #e8d5d0;
      border: 1.5px solid #c0392b;
      user-select: none;
      letter-spacing: 1px;
      transition: background 0.12s;
    }
    .piece:hover { background: #d4b0a8; }

    /* เปิดแล้ว → โปร่งใส เห็นรูปข้างล่าง */
    .piece.open {
      background: transparent !important;
      border-color: transparent !important;
      cursor: default;
      pointer-events: none;
      color: transparent;
    }

    /* ---------- Status ---------- */
    #status {
      text-align: center;
      font-size: 11px;
      color: #aaa;
      min-height: 20px;
      margin-bottom: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ---------- Buttons ---------- */
    #action-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    #reveal-btn {
      font-size: 13px;
      padding: 10px 28px;
      border-radius: 4px;
      border: 1.5px solid #c0392b;
      background: #fff;
      color: #c0392b;
      cursor: pointer;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #reveal-btn:hover  { background: #fdf0ee; }
    #reveal-btn:disabled { opacity: 0.35; cursor: default; }

    #next-btn {
      display: none;
      font-size: 13px;
      padding: 10px 32px;
      border-radius: 4px;
      border: 1.5px solid #c0392b;
      background: #c0392b;
      color: #fff;
      cursor: pointer;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #next-btn:hover { background: #a93226; }

    /* ---------- Final Screen ---------- */
    #final-screen {
      display: none;
      text-align: center;
      padding: 3rem 0;
    }

    .divider {
      width: 50px;
      height: 2px;
      background: #c0392b;
      margin: 1rem auto;
    }

    #final-label {
      font-size: 11px;
      font-weight: 800;
      color: #bbb;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    #final-score {
      font-size: 56px;
      font-weight: 900;
      color: #c0392b;
      margin: 6px 0;
      letter-spacing: -2px;
    }

    #final-grade {
      font-size: 13px;
      color: #999;
      font-weight: 700;
      margin-bottom: 2rem;
      letter-spacing: 1px;
    }

    #replay-btn {
      font-size: 12px;
      padding: 12px 36px;
      border-radius: 4px;
      border: 1.5px solid #c0392b;
      background: #fff;
      color: #c0392b;
      cursor: pointer;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    #replay-btn:hover { background: #c0392b; color: #fff; }
  </style>
</head>

<body>
<div id="app">

  <h1>JIGSAW QUIZ</h1>
  <div class="subtitle">ทายรูปจากจิ๊กซอ</div>

  <!-- ==================== GAME SCREEN ==================== -->
  <div id="game-screen">

    <div id="top-bar">
      <span class="round-info">
        ROUND <strong id="round-lbl">1</strong> / <span id="total-lbl">1</span>
      </span>
      <div id="score-box">SCORE &nbsp;<span id="score-disp">0</span></div>
      <button id="hint-btn">HINT</button>
    </div>

    <div id="prog-dots"></div>

    <div id="puzzle-wrap">
      <canvas id="bg-canvas" width="360" height="360"></canvas>
      <div id="pieces-layer"></div>
    </div>

    <div id="status">CLICK A NUMBER TO REVEAL</div>

    <div id="action-row">
      <button id="reveal-btn">เฉลย</button>
      <button id="next-btn">NEXT &rarr;</button>
    </div>

  </div><!-- /game-screen -->

  <!-- ==================== FINAL SCREEN ==================== -->
  <div id="final-screen">
    <div id="final-label">FINAL SCORE</div>
    <div id="final-score"></div>
    <div class="divider"></div>
    <div id="final-grade"></div>
    <button id="replay-btn">PLAY AGAIN</button>
  </div>

</div><!-- /app -->


<!-- =====================================================
     ✏️  แก้ไขตรงนี้
     - src   : path รูป เช่น "images/cat.jpg" หรือ URL
     - label : ชื่อที่แสดงเป็นคำเฉลย
===================================================== -->
<script>
  const IMAGES = [
    {
      src:   "ศกพ..jpg",
      label: "ศกพ",
    },
    {
      src:   "หอ.jpg",
      label: "หอลอยฟ้า",
    },
    {
      src:   "st.jpg",
      label: "ตึกST",
    },
    // เพิ่มรูปตรงนี้ได้เลย ↓
    // { src: "รูป4.jpg", label: "ชื่อ4" },
  ];

  // ความยาก: 3 = ง่าย | 4 = ปานกลาง | 5 = ยาก
  const GRID = 4;
</script>


<!-- =====================================================
     ⚙️  GAME LOGIC  (ปกติไม่ต้องแก้ส่วนนี้)
===================================================== -->
<script>
  const SIZE  = 360;
  const COLS  = GRID;
  const ROWS  = GRID;
  const TOTAL = COLS * ROWS;

  let score       = 0;
  let roundIdx    = 0;
  let answered    = false;
  let openedCount = 0;
  let loadedImgs  = [];

  /* ---------- Helpers ---------- */

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function revealAll() {
    document.querySelectorAll('.piece').forEach(p => p.classList.add('open'));
  }

  /* ---------- Init ---------- */

  async function init() {
    loadedImgs = [];

    for (const item of IMAGES) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.src = item.src;
      await new Promise(r => { img.onload = r; img.onerror = r; });
      loadedImgs.push(img);
    }

    document.getElementById('total-lbl').textContent = IMAGES.length;
    score    = 0;
    roundIdx = 0;

    document.getElementById('final-screen').style.display = 'none';
    document.getElementById('game-screen').style.display  = 'block';

    startRound();
  }

  /* ---------- Round ---------- */

  function startRound() {
    answered    = false;
    openedCount = 0;

    document.getElementById('reveal-btn').disabled       = false;
    document.getElementById('next-btn').style.display    = 'none';
    document.getElementById('round-lbl').textContent     = roundIdx + 1;
    document.getElementById('score-disp').textContent    = score;

    buildDots();
    drawBackground();
    buildPieces();
    setStatus('CLICK A NUMBER TO REVEAL');
  }

  /* ---------- Progress Dots ---------- */

  function buildDots() {
    const el = document.getElementById('prog-dots');
    el.innerHTML = '';
    IMAGES.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'dot'
        + (i <  roundIdx ? ' done' : '')
        + (i === roundIdx ? ' curr' : '');
      el.appendChild(dot);
    });
  }

  /* ---------- Background Image ---------- */

  function drawBackground() {
    const canvas = document.getElementById('bg-canvas');
    const ctx    = canvas.getContext('2d');
    const img    = loadedImgs[roundIdx];

    if (!img || !img.naturalWidth) {
      ctx.fillStyle = '#ecddd9';
      ctx.fillRect(0, 0, SIZE, SIZE);
      return;
    }

    const scale = Math.max(SIZE / img.naturalWidth, SIZE / img.naturalHeight);
    const sw    = SIZE / scale;
    const sh    = SIZE / scale;
    const sx    = (img.naturalWidth  - sw) / 2;
    const sy    = (img.naturalHeight - sh) / 2;

    ctx.clearRect(0, 0, SIZE, SIZE);
    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, SIZE, SIZE);
  }

  /* ---------- Pieces ---------- */

  function buildPieces() {
    const layer = document.getElementById('pieces-layer');
    layer.innerHTML = '';

    const pw = SIZE / COLS;
    const ph = SIZE / ROWS;

    Array.from({ length: TOTAL }, (_, i) => i).forEach(idx => {
      const row = Math.floor(idx / COLS);
      const col = idx % COLS;

      const piece = document.createElement('div');
      piece.className = 'piece';
      piece.style.cssText = `
        left:   ${col * pw}px;
        top:    ${row * ph}px;
        width:  ${pw}px;
        height: ${ph}px;
      `;
      piece.textContent = idx + 1;
      piece.addEventListener('click', () => openPiece(piece));

      layer.appendChild(piece);
    });
  }

  function openPiece(piece) {
    if (piece.classList.contains('open') || answered) return;
    piece.classList.add('open');
    openedCount++;

    if (openedCount === 1) setStatus('KEEP GOING...');
    if (openedCount >= 3) setStatus(`${openedCount} ชิ้นเปิดแล้ว — ทายได้เลย`);
  }

  /* ---------- Reveal (เฉลย) ---------- */

  document.getElementById('reveal-btn').addEventListener('click', () => {
    if (answered) return;
    answered = true;
    revealAll();

    const pts = Math.max(TOTAL - openedCount, 0) * 10;
    score += pts;

    const label = IMAGES[roundIdx].label.toUpperCase();
    setStatus(pts > 0 ? `เฉลย: ${label}  +${pts} PTS` : `เฉลย: ${label}`);

    document.getElementById('reveal-btn').disabled    = true;
    document.getElementById('score-disp').textContent = score;

    const nb = document.getElementById('next-btn');
    nb.style.display = 'block';
    nb.textContent   = roundIdx === IMAGES.length - 1 ? 'ผล →' : 'NEXT →';
  });

  /* ---------- Hint ---------- */

  document.getElementById('hint-btn').addEventListener('click', () => {
    if (answered) return;
    answered = true;
    revealAll();

    document.getElementById('reveal-btn').disabled = true;
    setStatus(`เฉลย: ${IMAGES[roundIdx].label.toUpperCase()}`);

    const nb = document.getElementById('next-btn');
    nb.style.display = 'block';
    nb.textContent   = roundIdx === IMAGES.length - 1 ? 'ผล →' : 'NEXT →';
  });

  /* ---------- Next ---------- */

  document.getElementById('next-btn').addEventListener('click', () => {
    roundIdx++;
    if (roundIdx >= IMAGES.length) showFinal();
    else startRound();
  });

  /* ---------- Final Screen ---------- */

  function showFinal() {
    document.getElementById('game-screen').style.display  = 'none';
    document.getElementById('final-screen').style.display = 'block';
    document.getElementById('final-score').textContent    = score;

    const maxPts = IMAGES.length * TOTAL * 10;
    const pct    = score / maxPts;
    document.getElementById('final-grade').textContent =
      pct >= 0.7 ? 'OUTSTANDING — ตาแหลมสุด' :
      pct >= 0.4 ? 'WELL DONE — เก่งมาก'     :
                   'TRY AGAIN — สู้ต่อไป';
  }

  /* ---------- Replay ---------- */

  document.getElementById('replay-btn').addEventListener('click', () => {
    score    = 0;
    roundIdx = 0;
    document.getElementById('final-screen').style.display = 'none';
    document.getElementById('game-screen').style.display  = 'block';
    startRound();
  });

  /* ---------- Start! ---------- */
  init();
</script>

</body>
</html>
